name: Deploy GueClaw → VPS

# ⚠️ IMPORTANTE: Requer secret VPS_SSH_PRIVATE_KEY configurado no GitHub
# Ver: docs/GITHUB-ACTIONS-SSH-SETUP.md

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite disparo manual pela UI do GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Grava .env na VPS a partir dos GitHub Secrets ─────────────────────
      - name: Write .env on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.69.211
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cat > /opt/gueclaw-agent/.env << 'ENVEOF'
            # ============================================
            # GueClaw Agent Configuration — auto-generated by CI
            # ============================================

            # Telegram
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_ALLOWED_USER_IDS=${{ secrets.TELEGRAM_ALLOWED_USER_IDS }}
            TELEGRAM_USER_CHAT_ID=${{ secrets.TELEGRAM_USER_CHAT_ID }}

            # LLM Providers
            GITHUB_COPILOT_USE_OAUTH=true
            GITHUB_COPILOT_MODEL=claude-sonnet-4.5

            # DeepSeek
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=https://api.deepseek.com/v1
            DEEPSEEK_MODEL_FAST=deepseek-chat
            DEEPSEEK_MODEL_REASONING=deepseek-reasoner

            # Gemini
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

            # UazAPI (WhatsApp)
            UAIZAPI_TOKEN=${{ secrets.UAIZAPI_TOKEN }}
            UAIZAPI_BASE_URL=https://kyrius.uazapi.com

            # Agent
            MAX_ITERATIONS=5
            MEMORY_WINDOW_SIZE=10
            DEFAULT_PROVIDER=github-copilot

            # VPS
            VPS_HOST=root@147.93.69.211
            VPS_PORT=22
            VPS_USER=root
            VPS_PASSWORD=${{ secrets.VPS_PASSWORD }}
            VPS_SSH_KEY_PATH=
            FILE_WORKSPACE_ROOT=/opt/gueclaw-agent

            # Docker
            DOCKER_HOST=unix:///var/run/docker.sock
            DOCKER_NETWORK=gueclaw-network

            # Database
            DATABASE_PATH=./data/gueclaw.db
            ENABLE_WAL=true

            # File Processing
            MAX_FILE_SIZE_MB=50
            TEMP_DIR=./tmp
            ALLOWED_AUDIO_FORMATS=mp3,ogg,wav,m4a
            ALLOWED_DOCUMENT_FORMATS=pdf,csv,txt,md,json

            # Logging
            LOG_LEVEL=info
            LOG_FILE=./logs/gueclaw.log

            # Security
            ENABLE_RATE_LIMITING=true
            MAX_REQUESTS_PER_MINUTE=30

            # Google Calendar — Pessoal
            GOOGLE_PERSONAL_CLIENT_ID=${{ secrets.GOOGLE_PERSONAL_CLIENT_ID }}
            GOOGLE_PERSONAL_CLIENT_SECRET=${{ secrets.GOOGLE_PERSONAL_CLIENT_SECRET }}
            GOOGLE_PERSONAL_REDIRECT_URI=${{ secrets.GOOGLE_PERSONAL_REDIRECT_URI }}
            GOOGLE_PERSONAL_REFRESH_TOKEN=${{ secrets.GOOGLE_PERSONAL_REFRESH_TOKEN }}
            GOOGLE_PERSONAL_CALENDAR_ID=${{ secrets.GOOGLE_PERSONAL_CALENDAR_ID }}

            # Google Calendar — Profissional
            GOOGLE_WORK_CLIENT_ID=${{ secrets.GOOGLE_WORK_CLIENT_ID }}
            GOOGLE_WORK_CLIENT_SECRET=${{ secrets.GOOGLE_WORK_CLIENT_SECRET }}
            GOOGLE_WORK_REDIRECT_URI=${{ secrets.GOOGLE_WORK_REDIRECT_URI }}
            GOOGLE_WORK_REFRESH_TOKEN=${{ secrets.GOOGLE_WORK_REFRESH_TOKEN }}
            GOOGLE_WORK_CALENDAR_ID=${{ secrets.GOOGLE_WORK_CALENDAR_ID }}

            # Obsidian Vault
            OBSIDIAN_VAULT_REPO=${{ secrets.OBSIDIAN_VAULT_REPO }}
            OBSIDIAN_VAULT_PATH=/opt/obsidian-vault
            OBSIDIAN_GITHUB_TOKEN=${{ secrets.OBSIDIAN_GITHUB_TOKEN }}
            GITHUB_CLASSIC=${{ secrets.GITHUB_CLASSIC }}

            # n8n
            N8N_API_URL=${{ secrets.N8N_API_URL }}
            N8N_API_KEY=${{ secrets.N8N_API_KEY }}
            ENVEOF
            chmod 600 /opt/gueclaw-agent/.env
            echo "✅ .env escrito em /opt/gueclaw-agent/.env"

      # ── 2. Roda update.sh (git pull + build + restart PM2) ───────────────────
      - name: Run update.sh on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.69.211
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/gueclaw-agent
            bash update.sh

      # ── 3. Smoke test — verifica se PM2 está running ──────────────────────────
      - name: Smoke test — PM2 status
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 147.93.69.211
          username: root
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            STATUS=$(pm2 jlist | python3 -c "
            import sys, json
            procs = json.load(sys.stdin)
            agent = next((p for p in procs if p['name'] == 'gueclaw-agent'), None)
            if not agent:
                print('NOT_FOUND')
            else:
                print(agent['pm2_env']['status'])
            ")
            echo "PM2 status: $STATUS"
            if [ "$STATUS" != "online" ]; then
              echo "❌ gueclaw-agent não está online (status: $STATUS)"
              pm2 logs gueclaw-agent --lines 30 --nostream
              exit 1
            fi
            echo "✅ gueclaw-agent online"
