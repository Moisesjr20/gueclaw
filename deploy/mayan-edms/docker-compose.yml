version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: mayan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mayan
      POSTGRES_USER: mayan
      POSTGRES_PASSWORD: ${MAYAN_DB_PASSWORD:-mayan_secure_password_2026}
    volumes:
      - /opt/mayan-edms/postgres:/var/lib/postgresql/data
    networks:
      - mayan-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayan -d mayan"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: mayan-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - /opt/mayan-edms/redis:/data
    networks:
      - mayan-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mayan-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: mayan
      RABBITMQ_DEFAULT_PASS: ${MAYAN_RABBITMQ_PASSWORD:-mayan_rabbitmq_2026}
    volumes:
      - /opt/mayan-edms/rabbitmq:/var/lib/rabbitmq
    networks:
      - mayan-network
    ports:
      - "15672:15672"  # Management UI (remove em produção se não precisar)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  mayan:
    image: mayanedms/mayanedms:latest
    container_name: mayan-edms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      MAYAN_ADMIN_USERNAME: ${MAYAN_ADMIN_USER:-admin}
      MAYAN_ADMIN_PASSWORD: ${MAYAN_ADMIN_PASSWORD:-admin123}
      MAYAN_DB_ENGINE: django.db.backends.postgresql
      MAYAN_DB_NAME: mayan
      MAYAN_DB_USER: mayan
      MAYAN_DB_PASSWORD: ${MAYAN_DB_PASSWORD:-mayan_secure_password_2026}
      MAYAN_DB_HOST: postgres
      MAYAN_DB_PORT: 5432
      MAYAN_REDIS_HOST: redis
      MAYAN_CELERY_BROKER_URL: amqp://mayan:${MAYAN_RABBITMQ_PASSWORD:-mayan_rabbitmq_2026}@rabbitmq:5672/
      MAYAN_SECRET_KEY: ${MAYAN_SECRET_KEY:-CHANGE_THIS_SECRET_KEY}
      MAYAN_ALLOWED_HOSTS: ${MAYAN_ALLOWED_HOSTS:-docs.kyrius.com.br,147.93.69.211,localhost}
      MAYAN_MEDIA_ROOT: /var/lib/mayan/media
      MAYAN_STATIC_ROOT: /var/lib/mayan/static
      MAYAN_WORKERS: 2
      MAYAN_WORKER_CLASS: prefork
      MAYAN_PREFORK_CHILDREN: 2
      WEB_WORKER_CLASS: gevent
      WEB_WORKER_COUNT: 2
    volumes:
      - /opt/mayan-edms/media:/var/lib/mayan/media
      - /opt/mayan-edms/config/settings.py:/etc/mayan/conf/settings.py:ro
    networks:
      - mayan-network
      - gueclaw-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mayan.rule=Host(`docs.kyrius.com.br`)"
      - "traefik.http.routers.mayan.entrypoints=websecure"
      - "traefik.http.routers.mayan.tls=true"
      - "traefik.http.routers.mayan.tls.certresolver=letsencrypt"
      - "traefik.http.services.mayan.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: 1536M

  tesseract:
    image: mayanedms/mayanedms:tesseract
    container_name: mayan-tesseract
    restart: unless-stopped
    environment:
      TESSERACT_LANGUAGES: por+eng
    volumes:
      - /opt/mayan-edms/media:/var/lib/mayan/media:ro
    networks:
      - mayan-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  mayan-network:
    driver: bridge
  gueclaw-network:
    external: true
